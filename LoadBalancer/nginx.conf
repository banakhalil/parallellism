events {}

http {
    upstream django_cluster {
        least_conn;
        server web1:8001;
        server web2:8002;
        server web3:8003;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://django_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}